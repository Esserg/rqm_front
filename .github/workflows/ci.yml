name: CI/CD Frontend Pipeline

on:
  push:
    branches:
      - main # Пайплайн сработает при пуше в главную ветку фронтенда

jobs:
  build-and-push:
    # КРИТИЧНО: Привязываем сборку строго к вашему новому фронтенд-раннеру
    runs-on: [self-hosted, rqm-frontend]

    steps:
      # Шаг 1: Скачиваем исходный код фронтенда на раннер
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Сборка Docker-образа и отправка в локальный Registry
      - name: Build and Push Docker Image
        run: |
          REGISTRY_URL="docker-registry.home.local"
          IMAGE_NAME="rqm-frontend"
          IMAGE_TAG="${{ github.sha }}" # Уникальный тег на основе хэша коммита
          
          echo "==== Сборка Docker-образа фронтенда ===="
          # Docker сам запустит npm install и npm run build внутри контейнера
          docker build -t $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG .
          
          echo "==== Пуш образа в локальный Registry ===="
          docker push $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG
          
          echo "==== Создание и пуш тега latest ===="
          docker tag $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG $REGISTRY_URL/$IMAGE_NAME:latest
          docker push $REGISTRY_URL/$IMAGE_NAME:latest
